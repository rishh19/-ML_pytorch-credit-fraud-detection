<!DOCTYPE html>
<html>
<head>
<title>Fraud Detection Dashboard</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:600px;
margin:40px auto;
background:#1e293b;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.result{
margin-top:20px;
font-size:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="header">
Credit Card Fraud Detection Dashboard
</div>

<div class="container">

<p>Enter transaction features (30 values)</p>

<textarea id="features" rows="5" style="width:100%"></textarea>

<button onclick="predict()">Predict Fraud</button>

<div class="result" id="result"></div>

</div>

<script>

async function predict(){

let features = document.getElementById("features").value.split(",").map(Number)

let response = await fetch("http://127.0.0.1:8000/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
features:features
})
})

let data = await response.json()

document.getElementById("result").innerHTML = "Prediction: " + data.prediction

}

</script>

</body>
</html>
